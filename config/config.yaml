agents:
  planner:
    model: gpt-4o
    temperature: 0.1
    max_iterations: 3
  research:
    model: gpt-4o-mini
    temperature: 0.2
    max_search_results: 10
  critic:
    model: gpt-4o
    temperature: 0.0
    confidence_threshold: 0.75
  synthesis:
    model: gpt-4o
    temperature: 0.3
  writer:
    model: gpt-4o
    temperature: 0.4

retrieval:
  chunk_size: 512
  chunk_overlap: 64
  top_k: 8
  embedding_model: text-embedding-3-small

redis:
  session_ttl: 3600
  max_sessions: 100

api:
  host: 0.0.0.0
  port: 8000
  workers: 4
